  web-target:
    image: nginx:alpine
    container_name: web-target
    ports:
      - "80:80"
    cap_add:
      - NET_ADMIN
    networks:
      - wazuhlab_net

  attacker-simulator:
    image: alpine:latest
    container_name: attacker-simulator
    entrypoint: ["sleep", "infinity"]
